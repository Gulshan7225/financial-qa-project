<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Financial Report QA</title>
<style>
  :root {
    --blue: #1d4ed8;
    --blue-dark: #1e3a8a;
    --bg: #f5f7fa;
    --card: #ffffff;
    --border: #dde3ec;
    --text: #1f2933;
    --muted: #6b7280;
    --green: #15803d;
    --red: #b91c1c;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  header {
    background: var(--blue-dark);
    color: white;
    padding: 18px 24px;
  }
  header h1 { margin: 0; font-size: 20px; }
  header p { margin: 4px 0 0; font-size: 13px; color: #cbd5e1; }

  main {
    max-width: 960px;
    margin: 24px auto;
    padding: 0 16px 60px;
    display: grid;
    gap: 20px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
  }
  .card h2 {
    margin: 0 0 12px;
    font-size: 16px;
    color: var(--blue-dark);
  }

  input[type="file"] { font-size: 14px; }
  input[type="text"] {
    width: 100%;
    padding: 10px 12px;
    font-size: 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
  }
  select {
    padding: 8px 10px;
    font-size: 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: white;
  }

  button {
    background: var(--blue);
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
  }
  button:hover { background: var(--blue-dark); }
  button:disabled { background: #9ca3af; cursor: not-allowed; }

  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

  .status-pill {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
  }
  .status-done { background: #dcfce7; color: var(--green); }
  .status-pending, .status-processing { background: #fef9c3; color: #92400e; }
  .status-failed { background: #fee2e2; color: var(--red); }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    margin-top: 8px;
  }
  th, td {
    border: 1px solid var(--border);
    padding: 6px 8px;
    text-align: left;
  }
  th { background: #f0f4f9; }

  .answer-box {
    margin-top: 12px;
    padding: 14px;
    background: #f0f6ff;
    border: 1px solid #c7d9f5;
    border-radius: 6px;
    font-size: 14px;
    white-space: pre-wrap;
  }
  .confidence {
    font-size: 11px;
    text-transform: uppercase;
    font-weight: 700;
    letter-spacing: 0.04em;
    margin-bottom: 6px;
    display: inline-block;
  }
  .conf-high { color: var(--green); }
  .conf-medium { color: #92400e; }
  .conf-low { color: var(--red); }

  .muted { color: var(--muted); font-size: 13px; }
  .hidden { display: none; }
  .source-item {
    font-size: 12px;
    color: var(--muted);
    border-left: 3px solid var(--blue);
    padding-left: 8px;
    margin-top: 6px;
  }
  .metric-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
    margin-top: 8px;
  }
  .metric-box {
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
  }
  .metric-box .label { font-size: 12px; color: var(--muted); }
  .metric-box .value { font-size: 18px; font-weight: 700; margin-top: 2px; }
  .example-q {
    display: inline-block;
    font-size: 12px;
    background: #eef2ff;
    color: var(--blue-dark);
    padding: 4px 10px;
    border-radius: 999px;
    margin: 3px 4px 0 0;
    cursor: pointer;
    border: 1px solid #c7d2fe;
  }
  .example-q:hover { background: #e0e7ff; }
</style>
</head>
<body>

<header>
  <h1>Financial Report QA</h1>
  <p>Upload a financial PDF, then ask questions about the numbers it contains.</p>
</header>

<main>

  <section class="card">
    <h2>1. Upload a report</h2>
    <div class="row">
      <input type="file" id="fileInput" accept="application/pdf" />
      <button id="uploadBtn">Upload &amp; process</button>
    </div>
    <p id="uploadStatus" class="muted"></p>
  </section>

  <section class="card hidden" id="reportSection">
    <h2>2. Report</h2>
    <p>
      <strong id="reportName"></strong>
      &nbsp;·&nbsp;
      <span id="statusPill" class="status-pill"></span>
      &nbsp;·&nbsp;
      <span class="muted" id="reportMeta"></span>
    </p>

    <div id="summaryBox" class="hidden">
      <h3 style="font-size:14px; margin-bottom:4px;">Key metrics</h3>
      <div class="metric-grid" id="metricGrid"></div>
    </div>
  </section>

  <section class="card hidden" id="questionSection">
    <h2>3. Ask a question</h2>
    <div class="row">
      <input type="text" id="questionInput" placeholder="e.g. What was total revenue in Q4?" />
      <button id="askBtn">Ask</button>
    </div>
    <div id="exampleQuestions"></div>
    <div id="answerBox" class="hidden"></div>
  </section>

  <section class="card hidden" id="tableSection">
    <h2>4. Extracted tables</h2>
    <div id="tablesContainer"></div>
  </section>

  <section class="card hidden" id="chartSection">
    <h2>5. Charts</h2>
    <div class="row">
      <label for="metricSelect" class="muted" style="font-size:13px;">Metric:</label>
      <select id="metricSelect"></select>
      <button id="viewChartBtn">View chart</button>
    </div>
    <div id="chartContainer" style="margin-top:14px;"></div>
  </section>

</main>

<script>
const API_BASE = window.location.origin + "/api/v1";
let currentReportId = null;

const $ = (id) => document.getElementById(id);

async function api(path, options = {}) {
  const res = await fetch(API_BASE + path, {
    headers: { "Content-Type": "application/json" },
    ...options,
  });
  if (!res.ok) {
    const body = await res.json().catch(() => ({}));
    throw new Error(body.detail || `Request failed (${res.status})`);
  }
  return res.json();
}

$("uploadBtn").addEventListener("click", async () => {
  const file = $("fileInput").files[0];
  if (!file) {
    $("uploadStatus").textContent = "Choose a PDF file first.";
    return;
  }
  $("uploadBtn").disabled = true;
  $("uploadStatus").textContent = "Uploading and extracting data — this can take a few seconds…";

  const formData = new FormData();
  formData.append("file", file);

  try {
    const res = await fetch(API_BASE + "/reports/upload", { method: "POST", body: formData });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || "Upload failed");

    currentReportId = data.report_id;
    $("uploadStatus").textContent = "";
    await loadReport(data.report_id);
  } catch (err) {
    $("uploadStatus").textContent = "Error: " + err.message;
  } finally {
    $("uploadBtn").disabled = false;
  }
});

async function loadReport(reportId) {
  const status = await api(`/reports/${reportId}/status`);

  $("reportSection").classList.remove("hidden");
  $("reportName").textContent = $("fileInput").files[0]?.name || "Uploaded report";
  $("statusPill").textContent = status.status;
  $("statusPill").className = "status-pill status-" + status.status;
  $("reportMeta").textContent =
    `${status.pages ?? "?"} page(s) · ${status.tables_found ?? 0} table(s) · ${status.charts_found ?? 0} chart(s)`;

  if (status.status !== "done") {
    if (status.error) $("reportMeta").textContent += ` · Error: ${status.error}`;
    return;
  }

  $("questionSection").classList.remove("hidden");
  $("tableSection").classList.remove("hidden");

  await loadSummary(reportId);
  await loadTables(reportId);
}

async function loadSummary(reportId) {
  try {
    const summary = await api(`/reports/${reportId}/summary`);
    const grid = $("metricGrid");
    grid.innerHTML = "";
    const entries = Object.entries(summary.key_metrics || {});
    if (!entries.length) {
      $("summaryBox").classList.add("hidden");
      return;
    }
    $("summaryBox").classList.remove("hidden");
    const isPortfolio = entries.some(([name]) => name.startsWith("portfolio_") || name.startsWith("total_portfolio_"));
    EXAMPLE_QUESTIONS = isPortfolio ? PORTFOLIO_EXAMPLE_QUESTIONS : COMPANY_EXAMPLE_QUESTIONS;
    renderExampleQuestions();

    // Only metrics with a `history` array have per-period/per-holding data
    // that can actually be charted (aggregate "total_*" facts are a single
    // number and have nothing to plot).
    const chartable = entries.filter(([, m]) => Array.isArray(m.history) && m.history.length > 1);
    if (chartable.length) {
      $("chartSection").classList.remove("hidden");
      const select = $("metricSelect");
      select.innerHTML = chartable
        .map(([name]) => `<option value="${name}">${name.replace(/_/g, " ")}</option>`)
        .join("");
    } else {
      $("chartSection").classList.add("hidden");
    }

    for (const [name, m] of entries) {
      const box = document.createElement("div");
      box.className = "metric-box";
      const label = name.replace(/_/g, " ");
      let extra = "";
      if (m.period_over_period_growth_pct !== undefined) {
        extra = `<div class="muted">Δ ${m.period_over_period_growth_pct}% vs prior</div>`;
      } else if (m.holding_count !== undefined) {
        extra = `<div class="muted">${m.holding_count} holdings</div>`;
      }
      box.innerHTML = `
        <div class="label">${label}${m.latest_period ? " · " + m.latest_period : ""}</div>
        <div class="value">${formatValue(m.latest_value, m.unit)}</div>
        ${extra}
      `;
      grid.appendChild(box);
    }
  } catch (err) {
    $("summaryBox").classList.add("hidden");
  }
}

function formatValue(value, unit) {
  if (value === undefined || value === null) return "—";
  const abs = Math.abs(value);
  let formatted;
  if (abs >= 1_000_000) formatted = (value / 1_000_000).toFixed(2) + "M";
  else formatted = value.toLocaleString(undefined, { maximumFractionDigits: 2 });
  if (unit === "%") return formatted + "%";
  if (unit && unit !== "%") return unit + formatted;
  return formatted;
}

async function loadTables(reportId) {
  const tables = await api(`/reports/${reportId}/tables`);
  const container = $("tablesContainer");
  container.innerHTML = "";
  if (!tables.length) {
    container.innerHTML = '<p class="muted">No tables were detected in this report.</p>';
    return;
  }
  for (const t of tables) {
    const wrap = document.createElement("div");
    wrap.style.marginBottom = "18px";
    const title = document.createElement("p");
    title.innerHTML = `<strong>${t.title || "Table"}</strong> <span class="muted">— page ${t.page}</span>`;
    wrap.appendChild(title);

    const table = document.createElement("table");
    const thead = document.createElement("thead");
    thead.innerHTML = "<tr>" + t.headers.map(h => `<th>${h}</th>`).join("") + "</tr>";
    table.appendChild(thead);
    const tbody = document.createElement("tbody");
    tbody.innerHTML = t.rows.map(r => "<tr>" + r.map(c => `<td>${c}</td>`).join("") + "</tr>").join("");
    table.appendChild(tbody);
    wrap.appendChild(table);
    container.appendChild(wrap);
  }
}

const COMPANY_EXAMPLE_QUESTIONS = [
  "What was total revenue?",
  "What was net income?",
  "What was total assets?",
];
const PORTFOLIO_EXAMPLE_QUESTIONS = [
  "What is the total market value of my portfolio?",
  "What is the total cost value of my investments?",
  "Which fund has the highest market value?",
];
let EXAMPLE_QUESTIONS = COMPANY_EXAMPLE_QUESTIONS;

function renderExampleQuestions() {
  const el = $("exampleQuestions");
  el.innerHTML = "";
  for (const q of EXAMPLE_QUESTIONS) {
    const span = document.createElement("span");
    span.className = "example-q";
    span.textContent = q;
    span.onclick = () => { $("questionInput").value = q; askQuestion(); };
    el.appendChild(span);
  }
}
renderExampleQuestions();

$("askBtn").addEventListener("click", askQuestion);
$("questionInput").addEventListener("keydown", (e) => { if (e.key === "Enter") askQuestion(); });

$("viewChartBtn").addEventListener("click", () => {
  const metric = $("metricSelect").value;
  if (!metric || !currentReportId) return;
  const container = $("chartContainer");
  container.innerHTML = "Loading…";
  const img = new Image();
  img.style.maxWidth = "100%";
  img.style.border = "1px solid var(--border)";
  img.style.borderRadius = "6px";
  img.onload = () => { container.innerHTML = ""; container.appendChild(img); };
  img.onerror = () => { container.textContent = "Could not render a chart for this metric."; };
  img.src = `${API_BASE}/reports/${currentReportId}/chart-image?metric=${encodeURIComponent(metric)}&t=${Date.now()}`;
});

async function askQuestion() {
  const question = $("questionInput").value.trim();
  if (!question || !currentReportId) return;

  $("askBtn").disabled = true;
  const box = $("answerBox");
  box.classList.remove("hidden");
  box.className = "answer-box";
  box.textContent = "Thinking…";

  try {
    const resp = await api(`/reports/${currentReportId}/query`, {
      method: "POST",
      body: JSON.stringify({ question }),
    });

    const confClass = "conf-" + resp.confidence;
    let sourcesHtml = "";
    if (resp.sources?.length) {
      sourcesHtml = resp.sources
        .map(s => `<div class="source-item">${s.reference}: ${s.snippet}</div>`)
        .join("");
    }

    box.innerHTML = `
      <span class="confidence ${confClass}">${resp.confidence} confidence</span>
      <div>${resp.answer}</div>
      ${sourcesHtml}
    `;
  } catch (err) {
    box.textContent = "Error: " + err.message;
  } finally {
    $("askBtn").disabled = false;
  }
}
</script>

</body>
</html>
